<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ SITEDESCRIPTION }}{% endblock %}" />
  <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css" />
  {% if FEED_ALL_ATOM %}
  <link rel="alternate" type="application/atom+xml" title="{{ SITENAME }} Atom Feed" href="{{ FEED_ALL_ATOM }}" />
  {% endif %}
</head>
<body>

  <header class="site-header">
    <div class="site-banner">
      <img src="{{ SITEURL }}/images/{% if page and page.banner %}{{ page.banner }}{% else %}banner.jpg{% endif %}" alt="{{ SITENAME }}" />
    </div>
    <div class="container">
      <a href="{{ SITEURL }}/" class="site-title">{{ SITENAME }}</a>
      <nav class="site-nav">
        {% for title, url in MENUITEMS %}
        <a href="{{ url }}"{% if request and request.path == url %} class="active"{% endif %}>{{ title }}</a>
        {% endfor %}
        {% for p in pages %}
        <a href="{{ SITEURL }}/{{ p.url }}"{% if p == page %} class="active"{% endif %}>{{ p.title }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ COPYRIGHT_YEAR }} {{ AUTHOR }}</p>
    </div>
  </footer>

</body>
</html>
